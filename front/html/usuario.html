<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus - Mi Perfil</title>
  <link rel="stylesheet" href="../estilos/base.css">
  <link rel="stylesheet" href="../estilos/layout.css">
  <link rel="stylesheet" href="../estilos/components.css">
  <link rel="stylesheet" href="../estilos/usuario.css">
</head>
<body>

  <!-- Header -->
  <header class="main-header">
    <div class="header-left">
      <a href="index.html" class="header-logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"></polygon>
          <line x1="12" y1="22" x2="12" y2="15.5"></line>
          <polyline points="22 8.5 12 15.5 2 8.5"></polyline>
          <polyline points="2 15.5 12 8.5 22 15.5"></polyline>
          <line x1="12" y1="2" x2="12" y2="8.5"></line>
        </svg>
        Nexus
      </a>
      <nav class="header-nav">
        <a href="index.html" class="nav-link">Explorar</a>
        <a href="constelaciones.html" class="nav-link" id="navConstelaciones">Constelaciones</a>
        <a href="upload.html" class="nav-link" id="navCrear" style="display: none;">Crear</a>
      </nav>
    </div>

    <div class="header-right">
      <div id="userMenu" class="user-menu" style="display: none;">
        <div class="user-avatar" id="headerAvatar"></div>
        <div class="dropdown-menu">
          <a href="usuario.html" class="dropdown-item active">Mi perfil</a>
          <a href="biblioteca.html" class="dropdown-item">Mi biblioteca</a>
          <a href="moderacion.html" class="dropdown-item" id="navModeracion" style="display: none;">Revisi&oacute;n Ã‰tica</a>
          <a href="settings.html" class="dropdown-item">Configuraci&oacute;n</a>
          <a href="#" class="dropdown-item text-danger" id="logoutBtn">Cerrar sesi&oacute;n</a>
        </div>
      </div>
    </div>
  </header>

  <main class="main-content container profile-container">
    <div id="loadingIndicator" class="loader"></div>

    <div id="profileContent" style="display: none;">
      <div class="profile-header">
        <div class="profile-avatar" id="profileAvatar"></div>
        <h1 class="profile-name" id="profileName"></h1>
        <p class="profile-username text-muted" id="profileUsername"></p>
        
        <div class="profile-metrics mt-3">
          <div class="metric"><strong id="metricPins">0</strong> Nodos Publicados</div>
          <div class="metric"><strong id="metricPending">0</strong> Pendientes</div>
          <div class="metric"><strong id="metricSaved">0</strong> Guardados</div>
        </div>

        <div class="profile-actions mt-4">
          <a href="settings.html" class="btn btn-outline">Editar perfil</a>
          <a href="upload.html" class="btn btn-primary">Crear nuevo nodo</a>
        </div>
      </div>

      <div class="profile-tabs">
        <button class="profile-tab active" data-tab="ALL">Mis Nodos</button>
        <button class="profile-tab" data-tab="PENDING">Pendientes</button>
        <button class="profile-tab" data-tab="APPROVED">Aprobados</button>
      </div>

      <div id="emptyState" class="text-center mt-4 text-muted" style="display: none;">
        <h3>No tienes nodos en este estado</h3>
        <p>Los nodos visuales que crees aparecer&aacute;n aqu&iacute;.</p>
      </div>
      
      <div class="masonry-grid" id="profileFeed">
        <!-- Nodos cargados v&iacute;a JS -->
      </div>
    </div>
  </main>

  <script src="../javascript/config.js"></script>
  <script src="../javascript/api.js"></script>
  <script src="../javascript/session.js"></script>
  <script src="../javascript/ui.js"></script>
  <script src="../javascript/usuario.js"></script>
</body>
</html>
