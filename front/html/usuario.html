<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pinterest | Usuario</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../estilos/variables.css">
  <link rel="stylesheet" href="../estilos/base.css">
  <link rel="stylesheet" href="../estilos/usuario.css">
</head>

<body>
  <header class="topbar">
    <a class="brand" href="index.html">
      <span class="brand-mark">P</span>
      <span>Pinterest</span>
    </a>
    <nav class="main-nav">
      <a href="index.html" class="nav-link">Explorar</a>
      <a href="usuario.html" class="nav-link active">Mi perfil</a>
      <a href="upload.html" class="nav-link">Crear</a>
    </nav>
    <div class="session-actions" id="sessionActions"></div>
  </header>

  <main class="page-shell profile-shell">
    <section class="profile-hero" id="profileHero">
      <div class="avatar" id="profileAvatar">U</div>
      <div>
        <p class="eyebrow">Perfil de usuario</p>
        <h1 id="profileName">Cargando usuario...</h1>
        <p id="profileEmail"></p>
      </div>
      <a class="btn primary" href="upload.html">Nueva publicación</a>
    </section>

    <section class="profile-stats" aria-label="Resumen del perfil">
      <article>
        <strong id="totalPosts">0</strong>
        <span>Publicaciones</span>
      </article>
      <article>
        <strong id="approvedPosts">0</strong>
        <span>Aprobadas</span>
      </article>
      <article>
        <strong id="pendingPosts">0</strong>
        <span>Pendientes</span>
      </article>
    </section>

    <section class="feed-section" aria-labelledby="myPostsTitle">
      <div class="section-heading">
        <div>
          <h2 id="myPostsTitle">Mis publicaciones</h2>
          <p>Contenido subido desde tu cuenta.</p>
        </div>
      </div>
      <div class="status-message" id="statusMessage">Cargando publicaciones...</div>
      <div class="masonry-grid" id="userPostsGrid"></div>
    </section>
  </main>

  <script src="../javascript/config.js"></script>
  <script src="../javascript/api.js"></script>
  <script src="../javascript/session.js"></script>
  <script src="../javascript/usuario.js"></script>
</body>

</html>
