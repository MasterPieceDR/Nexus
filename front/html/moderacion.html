<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus - Revisi&oacute;n &Eacute;tica (Moderaci&oacute;n)</title>
  <link rel="stylesheet" href="../estilos/base.css">
  <link rel="stylesheet" href="../estilos/layout.css">
  <link rel="stylesheet" href="../estilos/components.css">
  <link rel="stylesheet" href="../estilos/moderacion.css">
</head>
<body>

  <!-- Header -->
  <header class="main-header">
    <div class="header-left">
      <a href="index.html" class="header-logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"></polygon>
          <line x1="12" y1="22" x2="12" y2="15.5"></line>
          <polyline points="22 8.5 12 15.5 2 8.5"></polyline>
          <polyline points="2 15.5 12 8.5 22 15.5"></polyline>
          <line x1="12" y1="2" x2="12" y2="8.5"></line>
        </svg>
        Nexus
      </a>
      <nav class="header-nav">
        <a href="index.html" class="nav-link">Explorar</a>
      </nav>
    </div>

    <div class="header-right">
      <div id="userMenu" class="user-menu" style="display: none;">
        <div class="user-avatar" id="headerAvatar"></div>
        <div class="dropdown-menu">
          <a href="usuario.html" class="dropdown-item">Mi perfil</a>
          <a href="moderacion.html" class="dropdown-item active" id="navModeracion">Revisi&oacute;n &Eacute;tica</a>
          <a href="#" class="dropdown-item text-danger" id="logoutBtn">Cerrar sesi&oacute;n</a>
        </div>
      </div>
    </div>
  </header>

  <main class="main-content container mod-container">
    <div class="mod-header mb-4">
      <h1>Panel de Revisi&oacute;n &Eacute;tica</h1>
      <p class="text-muted">Gesti&oacute;n de contenido pendiente de revisi&oacute;n y reportes comunitarios.</p>
    </div>

    <div class="mod-tabs">
      <button class="mod-tab active" data-tab="PENDING_NODES">Nodos Pendientes</button>
      <button class="mod-tab" data-tab="REPORTS">Reportes Abiertos</button>
    </div>

    <!-- Contenido: Nodos -->
    <div id="pendingNodesView">
      <div id="loadingNodes" class="loader"></div>
      <div id="emptyNodes" class="text-center mt-4 text-muted" style="display: none;">
        <h3>No hay contenido pendiente</h3>
        <p>Todo el contenido ha sido revisado.</p>
      </div>
      <div class="mod-grid" id="pendingGrid">
        <!-- Tarjetas de moderaci&oacute;n -->
      </div>
    </div>

    <!-- Contenido: Reportes -->
    <div id="reportsView" style="display: none;">
      <div id="loadingReports" class="loader"></div>
      <div id="emptyReports" class="text-center mt-4 text-muted" style="display: none;">
        <h3>No hay reportes abiertos</h3>
        <p>La comunidad est&aacute; tranquila hoy.</p>
      </div>
      <div class="mod-list" id="reportsList">
        <!-- Lista de reportes -->
      </div>
    </div>

  </main>

  <script src="../javascript/config.js"></script>
  <script src="../javascript/api.js"></script>
  <script src="../javascript/session.js"></script>
  <script src="../javascript/ui.js"></script>
  <script src="../javascript/modal.js"></script>
  <script src="../javascript/moderacion.js"></script>
</body>
</html>
