<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pinterest | Registro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../estilos/variables.css">
  <link rel="stylesheet" href="../estilos/base.css">
  <link rel="stylesheet" href="../estilos/auth.css">
</head>

<body class="auth-body">
  <main class="auth-layout">
    <section class="auth-card" aria-labelledby="registerTitle">
      <a class="brand auth-brand" href="index.html">
        <span class="brand-mark">P</span>
        <span> Pinterest</span>
      </a>
      <h1 id="registerTitle">Crear cuenta</h1>
      <p>Regístrate para subir contenido multimedia y administrar tus publicaciones.</p>
      <form id="registerForm" class="auth-form">
        <label for="fullName">Nombre completo</label>
        <input id="fullName" name="fullName" type="text" minlength="3" maxlength="100" required>
        <label for="email">Correo electrónico</label>
        <input id="email" name="email" type="email" maxlength="150" required>
        <label for="password">Contraseña</label>
        <input id="password" name="password" type="password" minlength="8" required>
        <label class="terms-line">
          <input id="acceptedTerms" type="checkbox" required>
          <span>Acepto las normas de uso y publicación responsable.</span>
        </label>
        <button class="btn primary full" type="submit">Crear cuenta</button>
      </form>
      <p class="form-message" id="formMessage"></p>
      <p class="auth-switch">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
    </section>
    <section class="auth-panel">
      <h2>Publica con control y seguridad</h2>
    </section>
  </main>
  <script src="../javascript/config.js"></script>
  <script src="../javascript/api.js"></script>
  <script src="../javascript/session.js"></script>
  <script src="../javascript/auth.js"></script>
</body>

</html>
