<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pinterest | Detalle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../estilos/variables.css">
  <link rel="stylesheet" href="../estilos/base.css">
  <link rel="stylesheet" href="../estilos/detalle.css">
</head>

<body>
  <header class="topbar">
    <a class="brand" href="index.html">
      <span class="brand-mark">P</span>
      <span>Pinterest</span>
    </a>
    <nav class="main-nav">
      <a href="index.html" class="nav-link">Explorar</a>
      <a href="usuario.html" class="nav-link protected-link">Mi perfil</a>
      <a href="upload.html" class="nav-link protected-link">Crear</a>
    </nav>
    <div class="session-actions" id="sessionActions"></div>
  </header>

  <main class="page-shell detail-shell">
    <section class="detail-card" id="detailCard">
      <div class="media-view" id="mediaView"></div>
      <article class="detail-content">
        <p class="eyebrow" id="detailCategory">Categoría</p>
        <h1 id="detailTitle">Cargando publicación...</h1>
        <p id="detailDescription"></p>
        <div class="metadata-grid">
          <span id="detailAuthor"></span>
          <span id="detailDate"></span>
          <span id="detailStatus"></span>
        </div>
        <div class="tag-list" id="detailTags"></div>
        <button class="btn soft" id="reportButton">Reportar contenido</button>
      </article>
    </section>

    <section class="comments-section" aria-labelledby="commentsTitle">
      <div class="section-heading">
        <h2 id="commentsTitle">Comentarios</h2>
      </div>
      <form class="comment-form" id="commentForm">
        <input id="commentInput" type="text" maxlength="300" placeholder="Escribe un comentario respetuoso" required>
        <button class="btn primary" type="submit">Comentar</button>
      </form>
      <div class="status-message" id="commentMessage"></div>
      <div class="comments-list" id="commentsList"></div>
    </section>
  </main>

  <script src="../javascript/config.js"></script>
  <script src="../javascript/api.js"></script>
  <script src="../javascript/session.js"></script>
  <script src="../javascript/detalle.js"></script>
</body>

</html>
