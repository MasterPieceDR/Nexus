<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pinterest | Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../estilos/variables.css">
  <link rel="stylesheet" href="../estilos/base.css">
  <link rel="stylesheet" href="../estilos/auth.css">
</head>

<body class="auth-body">
  <main class="auth-layout compact">
    <section class="auth-card" aria-labelledby="loginTitle">
      <a class="brand auth-brand" href="index.html">
        <span class="brand-mark">P</span>
        <span> Pinterest</span>
      </a>
      <h1 id="loginTitle">Iniciar sesión</h1>
      <p>Accede para publicar contenido, comentar y revisar tu perfil.</p>
      <form id="loginForm" class="auth-form">
        <label for="email">Correo electrónico</label>
        <input id="email" name="email" type="email" maxlength="150" required>
        <label for="password">Contraseña</label>
        <input id="password" name="password" type="password" minlength="8" required>
        <button class="btn primary full" type="submit">Entrar</button>
      </form>
      <p class="form-message" id="formMessage"></p>
      <p class="auth-switch">¿No tienes cuenta? <a href="register.html">Regístrate</a></p>
    </section>
  </main>
  <script src="../javascript/config.js"></script>
  <script src="../javascript/api.js"></script>
  <script src="../javascript/session.js"></script>
  <script src="../javascript/auth.js"></script>
</body>

</html>
